ci:
  autoupdate_commit_msg: "chore: Update pre-commit hooks"
  autofix_commit_msg: "style: Pre-commit fixes"

repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 34b52d9cda7b4e309aabd8c1edd82f33b06061eb  # v0.16
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c  # v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 21d9bff1d62aaf03230baa6b804b9074255fa9b8  # v0.4.1
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: ["--fix", "--show-fixes"]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 81dd99696c1d642c69c3158fd53b2d6c73245425  # v1.11.0
    hooks:
    - id: mypy
      additional_dependencies:
          - "types-requests"
